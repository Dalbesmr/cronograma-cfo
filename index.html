<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Aluno - CFO/MG</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C5A059; --navy: #003366; --bg: #f0f2f5; --danger: #ff4d4d; --success: #2ecc71; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; }
        
        header { background: var(--gold); padding: 30px 20px; text-align: center; border-bottom: 5px solid var(--navy); }
        .brand-logo { font-size: 3rem; font-weight: 900; color: black; letter-spacing: 8px; margin: 0; }
        
        nav { background: var(--navy); display: flex; justify-content: center; padding: 12px; gap: 20px; position: sticky; top: 0; z-index: 100; }
        nav a { color: white; text-decoration: none; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; cursor: pointer; opacity: 0.6; padding: 5px 10px; transition: 0.3s; }
        nav a.active { opacity: 1; border-bottom: 2px solid var(--gold); }

        .container { max-width: 900px; margin: 20px auto; padding: 0 20px; }
        .status-bar { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); text-align: center; border-top: 4px solid var(--gold); margin-bottom: 25px; }
        #clock { font-size: 2.5rem; font-weight: 900; color: var(--navy); margin: 0; }
        #date { color: #222; font-weight: 800; font-size: 1.1rem; text-transform: capitalize; }

        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Estilo das Listas */
        .day-section { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .day-title { background: var(--navy); color: white; padding: 12px 20px; font-weight: 800; text-transform: uppercase; border-bottom: 3px solid var(--gold); }
        .task-item { display: flex; align-items: center; padding: 15px 20px; border-bottom: 1px solid #eee; cursor: pointer; }
        .task-item:has(input:checked) { opacity: 0.4; filter: grayscale(1); }
        input[type="checkbox"] { width: 22px; height: 22px; margin-right: 15px; accent-color: var(--navy); }
        .info { flex: 1; }
        .name { font-weight: 700; font-size: 0.95rem; display: block; }
        .obs { font-size: 0.75rem; color: #666; font-weight: bold; }

        /* Página de Evolução */
        .prog-card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .prog-label { display: flex; justify-content: space-between; font-weight: 800; font-size: 0.8rem; margin-bottom: 8px; color: var(--navy); }
        .bar-bg { background: #eee; height: 10px; border-radius: 5px; overflow: hidden; }
        .bar-fill { background: var(--gold); height: 100%; transition: width 0.5s ease; }

        /* Questões Page */
        .stats-hero { background: var(--navy); color: white; padding: 30px; border-radius: 15px; text-align: center; margin-bottom: 25px; border-bottom: 8px solid var(--gold); }
        .big-perc { font-size: 3.5rem; font-weight: 900; color: var(--gold); display: block; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: white; width: 300px; margin: 20vh auto; padding: 30px; border-radius: 15px; text-align: center; }
        .modal input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        .modal button { background: var(--navy); color: white; border: none; padding: 12px; border-radius: 5px; width: 100%; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <p class="brand-logo">PMMG</p>
    <h1>Área do Aluno - CFO/MG</h1>
    <p>Rumo à Gloriosa</p>
</header>

<nav>
    <a onclick="showPage('grade')" id="nav-grade" class="active">Grade de Estudos</a>
    <a onclick="showPage('evolucao')" id="nav-evolucao">Evolução</a>
    <a onclick="showPage('questoes')" id="nav-questoes">Questões</a>
</nav>

<div class="container">
    <div class="status-bar">
        <p id="clock">00:00:00</p>
        <div id="date">Carregando...</div>
    </div>

    <div id="page-grade" class="page active">
        <div id="cronograma-render"></div>
    </div>

    <div id="page-evolucao" class="page">
        <div id="evolucao-render"></div>
    </div>

    <div id="page-questoes" class="page">
        <div class="stats-hero">
            <span style="text-transform: uppercase; font-weight: 800; opacity: 0.8;">Desempenho Geral</span>
            <span class="big-perc" id="resumo-perc">0%</span>
            <p id="resumo-detalhe">Carregando dados...</p>
        </div>
        <button onclick="localStorage.clear(); location.reload();" style="width:100%; padding:10px; border-radius:5px; border:1px solid #ccc; background:none; color:#999; cursor:pointer;">Zerar Todo o Progresso</button>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 style="color:var(--navy)">Questões do Bloco</h3>
        <input type="number" id="in-tot" placeholder="Total feitas">
        <input type="number" id="in-hit" placeholder="Total acertos">
        <button onclick="salvarQuestao()">Salvar Resultado</button>
    </div>
</div>

<script>
    // BASE DE DADOS EXTRAÍDA DOS SEUS PDFS (Mapeada por semanas)
    const bancoMaterias = {
        "Constitucional": ["Princípios Fundamentais", "Direitos e Garantias", "Organização do Estado", "Poder Judiciário", "Defesa do Estado e Instituições", "Controle de Constitucionalidade"],
        "Administrativo": ["Introdução e Regime Jurídico", "Organização Administrativa", "Atos Administrativos", "Agentes Públicos", "Poderes da Administração", "Responsabilidade Civil"],
        "Penal": ["Aplicação da Lei Penal", "Teoria do Crime", "Ilicitude e Culpabilidade", "Crimes contra a Pessoa", "Crimes contra o Patrimônio", "Crimes contra Adm. Pública"],
        "Processo Penal": ["Inquérito Policial", "Ação Penal", "Prisão e Liberdade", "Provas no Processo Penal"],
        "Processo Civil": ["Normas Processuais", "Função Jurisdicional", "Sujeitos do Processo"],
        "Português": ["Morfologia (Classes de Palavras)", "Conceitos Semânticos", "Sintaxe e Pontuação", "Interpretação de Texto"]
    };

    // Função para pegar o tema da semana atual (Ciclo de 12 semanas)
    function getTema(materia) {
        const dataInicio = new Date('2024-03-09'); // Início do seu projeto
        const hoje = new Date();
        const semanasPassadas = Math.floor((hoje - dataInicio) / (7 * 24 * 60 * 60 * 1000));
        const lista = bancoMaterias[materia];
        return lista[semanasPassadas % lista.length];
    }

    const estruturaCronograma = [
        { d: "Segunda-feira", id: 1, tarefas: [
            { h: "13:30", m: "Revisão Processo Penal", o: "24h" },
            { h: "13:45", m: "Português", mat: "Português", o: "Teoria + 10 Questões", q: true },
            { h: "14:45", m: "Dir. Constitucional", mat: "Constitucional", o: "Teoria + 10 Questões", q: true },
            { h: "16:00", m: "Direito Penal", mat: "Penal", o: "Teoria + 5 Questões", q: true },
            { h: "17:00", m: "Processo Penal", mat: "Processo Penal", o: "15 Questões", q: true }
        ]},
        { d: "Terça-feira", id: 2, tarefas: [
            { h: "13:30", m: "Revisão Penal", o: "24h" },
            { h: "13:45", m: "Português", mat: "Português", o: "Teoria + 10 Questões", q: true },
            { h: "14:45", m: "Dir. Constitucional", mat: "Constitucional", o: "Teoria + 10 Questões", q: true },
            { h: "16:00", m: "Dir. Administrativo", mat: "Administrativo", o: "Teoria + 5 Questões", q: true },
            { h: "17:00", m: "Processo Civil", mat: "Processo Civil", o: "15 Questões", q: true }
        ]}
        // Os demais dias seguem a mesma lógica de renderização
    ];

    let currentQ = null;

    function showPage(p) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
        document.getElementById('page-'+p).classList.add('active');
        document.getElementById('nav-'+p).classList.add('active');
        if(p === 'evolucao') renderEvolucao();
        if(p === 'questoes') updateStats();
    }

    function renderGrade() {
        const render = document.getElementById('cronograma-render');
        render.innerHTML = estruturaCronograma.map(dia => `
            <div class="day-section">
                <div class="day-title">${dia.d}</div>
                <div class="task-list">
                    ${dia.tarefas.map((t, idx) => {
                        const tema = t.mat ? ` [${getTema(t.mat)}]` : "";
                        const id = `cfo-${dia.id}-${idx}`;
                        const chk = localStorage.getItem(id) === 'true' ? 'checked' : '';
                        return `
                        <label class="task-item">
                            <input type="checkbox" onchange="handleTask('${id}', ${t.q || false}, this.checked)" ${chk}>
                            <span class="time-tag">${t.h}</span>
                            <div class="info"><span class="name">${t.m}${tema}</span><span class="obs">${t.o}</span></div>
                        </label>`;
                    }).join('')}
                </div>
            </div>
        `).join('');
    }

    function handleTask(id, isQ, checked) {
        localStorage.setItem(id, checked);
        if(checked && isQ) { currentQ = id; document.getElementById('modal').style.display = 'block'; }
        renderGrade();
    }

    function salvarQuestao() {
        localStorage.setItem(currentQ + '-tot', document.getElementById('in-tot').value);
        localStorage.setItem(currentQ + '-hit', document.getElementById('in-hit').value);
        document.getElementById('modal').style.display = 'none';
        renderGrade();
    }

    function renderEvolucao() {
        const container = document.getElementById('evolucao-render');
        container.innerHTML = Object.keys(bancoMaterias).map(mat => {
            // Lógica simples: Se houver 12 temas e você está na semana 2, progresso = 16%
            const prog = 15; // Exemplo de cálculo fixo para visualização
            return `
            <div class="prog-card">
                <div class="prog-label"><span>${mat}</span><span>${prog}%</span></div>
                <div class="bar-bg"><div class="bar-fill" style="width:${prog}%"></div></div>
            </div>`;
        }).join('');
    }

    function updateStats() {
        let tt = 0, th = 0;
        for (let i = 0; i < localStorage.length; i++){
            let k = localStorage.key(i);
            if (k.endsWith('-tot')) tt += parseInt(localStorage.getItem(k)) || 0;
            if (k.endsWith('-hit')) th += parseInt(localStorage.getItem(k)) || 0;
        }
        document.getElementById('resumo-perc').innerText = tt > 0 ? Math.round((th/tt)*100)+'%' : '0%';
        document.getElementById('resumo-detalhe').innerText = `Você resolveu ${tt} questões e acertou ${th}.`;
    }

    setInterval(() => {
        const n = new Date();
        document.getElementById('clock').innerText = n.toLocaleTimeString('pt-BR');
        document.getElementById('date').innerText = n.toLocaleDateString('pt-BR', {weekday:'long', day:'numeric', month:'long'});
    }, 1000);

    renderGrade();
</script>
</body>
</html>
