<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QAP | Cronograma PMMG</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #003366; --gold: #C5A059; --danger: #e74c3c; }
        body { font-family: 'Montserrat', sans-serif; background-color: #dee2e6; margin: 0; padding: 0; }
        header { background: var(--navy); color: white; padding: 40px 20px 80px; text-align: center; border-bottom: 4px solid var(--gold); }
        header h1 { margin: 0; font-size: 2rem; font-weight: 900; }
        header p { margin: 5px 0 0; color: var(--gold); font-weight: bold; letter-spacing: 2px; }
        .container { max-width: 600px; margin: -60px auto 50px; padding: 0 15px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 25px; text-align: center; border-top: 5px solid var(--gold); }
        #clock { font-size: 2.2rem; font-weight: 900; color: var(--navy); margin: 0; }
        .day-block { background: white; border-radius: 8px; margin-bottom: 15px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .day-header { background: #e9ecef; padding: 12px 20px; font-weight: 800; color: var(--navy); border-bottom: 2px solid var(--gold); text-transform: uppercase; }
        .task { display: flex; align-items: center; padding: 12px 20px; border-bottom: 1px solid #eee; cursor: pointer; }
        .task:last-child { border-bottom: none; }
        .task.break { background: #fff5f5; }
        .task.exercise { background: #f0fff4; }
        input[type="checkbox"] { width: 20px; height: 20px; margin-right: 15px; accent-color: var(--navy); }
        .time { font-size: 0.8rem; font-weight: 800; background: var(--navy); color: white; padding: 3px 6px; border-radius: 4px; margin-right: 10px; }
        .info { flex-grow: 1; }
        .label { font-weight: 700; display: block; font-size: 0.9rem; }
        .obs { font-size: 0.7rem; color: #666; }
        .badge { background: var(--danger); color: white; font-size: 0.6rem; padding: 2px 5px; border-radius: 3px; display: none; margin-left: 5px; }
        input:checked ~ .info .label { text-decoration: line-through; color: #ccc; }
        .summary { background: var(--navy); color: white; padding: 20px; border-radius: 12px; font-size: 0.8rem; }
        .summary h3 { color: var(--gold); margin: 0 0 10px; }
    </style>
</head>
<body>
    <header>
        <h1>CRONOGRAMA CFO</h1>
        <p>RUMO À GLORIOSA</p>
    </header>
    <div class="container">
        <div class="card">
            <p id="clock">00:00:00</p>
            <div id="date" style="font-weight: bold; color: #666;">Carregando...</div>
        </div>
        <div id="content"></div>
        <div class="summary">
            <h3>📊 Resumo de Metas</h3>
            Português e Constitucional: 5x/semana<br>
            Meta: 30-40 questões diárias
        </div>
    </div>
    <script>
        const dados = [
            { d: "Segunda-feira", id: 1, t: [
                { h: "13:30", m: "Revisão Processo Penal", o: "Revisão 24h" },
                { h: "13:45", m: "Português", o: "Teoria + 10 questões" },
                { h: "14:45", m: "Direito Constitucional", o: "Teoria + 10 questões" },
                { h: "15:45", m: "Pausa", o: "15 min", type: "break" },
                { h: "16:00", m: "Direito Penal", o: "Teoria + 5 questões" },
                { h: "17:00", m: "Processo Penal", o: "15 questões" },
                { h: "18:00", m: "Exercício", o: "Finalizar metas", type: "exercise" }
            ]},
            { d: "Terça-feira", id: 2, t: [
                { h: "13:30", m: "Revisão Penal", o: "Revisão 24h" },
                { h: "13:45", m: "Português", o: "Teoria + 10 questões" },
                { h: "14:45", m: "Direito Constitucional", o: "Lei Seca + 10 questões" },
                { h: "15:45", m: "Pausa", o: "15 min", type: "break" },
                { h: "16:00", m: "Direito Administrativo", o: "Teoria + 5 questões" },
                { h: "17:00", m: "Processo Civil", o: "15 questões" },
                { h: "18:00", m: "Direito Civil", o: "Teoria + 10 questões", type: "exercise" }
            ]},
            { d: "Quarta-feira", id: 3, t: [
                { h: "13:30", m: "Revisão Administrativo", o: "Revisão 24h" },
                { h: "13:45", m: "Português", o: "Interpretação + 10 questões" },
                { h: "14:45", m: "Direito Constitucional", o: "Controle + 10 questões" },
                { h: "15:45", m: "Pausa", o: "15 min", type: "break" },
                { h: "16:00", m: "Direito Penal", o: "Teoria + 5 questões" },
                { h: "17:00", m: "Legislação Extravagante", o: "10-15 questões" },
                { h: "18:00", m: "Exercício", o: "Finalizar metas", type: "exercise" }
            ]},
            { d: "Quinta-feira", id: 4, t: [
                { h: "13:30", m: "Revisão Civil", o: "Revisão 24h" },
                { h: "13:45", m: "Português", o: "Gramática + 10 questões" },
                { h: "14:45", m: "Direito Constitucional", o: "Org. Estado + 10 questões" },
                { h: "15:45", m: "Pausa", o: "15 min", type: "break" },
                { h: "16:00", m: "Processo Penal", o: "Teoria + 5 questões" },
                { h: "17:00", m: "Direito Administrativo", o: "15 questões" },
                { h: "18:00", m: "Processo Civil", o: "Teoria + 10 questões", type: "exercise" }
            ]},
            { d: "Sexta-feira", id: 5, t: [
                { h: "13:30", m: "Revisão Constitucional", o: "Revisão 24h" },
                { h: "13:45", m: "Português", o: "20 questões" },
                { h: "14:45", m: "Direito Constitucional", o: "20 questões" },
                { h: "15:45", m: "Pausa", o: "15 min", type: "break" },
                { h: "16:00", m: "Direito Civil", o: "Teoria + 5 questões" },
                { h: "17:00", m: "Legislação Extravagante", o: "15 questões" },
                { h: "17:40", m: "Revisão Semanal", o: "Erros e pontos fracos" },
                { h: "18:00", m: "Exercício", o: "Finalizar metas", type: "exercise" }
            ]}
        ];

        function montar() {
            document.getElementById('content').innerHTML = dados.map(dia => `
                <div class="day-block">
                    <div class="day-header">${dia.d}</div>
                    <div class="list" data-w="${dia.id}">
                        ${dia.t.map(x => {
                            const id = `cfo-${dia.id}-${x.h}`;
                            const chk = localStorage.getItem(id) === 'true' ? 'checked' : '';
                            return `<label class="task ${x.type || ''}">
                                <input type="checkbox" onchange="localStorage.setItem('${id}', this.checked); up();" ${chk}>
                                <span class="time">${x.h}</span>
                                <div class="info"><span class="label">${x.m}</span><span class="obs">${x.o}</span></div>
                                <span class="badge">ATRASADO</span>
                            </label>`;
                        }).join('')}
                    </div>
                </div>
            `).join('');
        }

        function up() {
            const n = new Date();
            document.getElementById('clock').innerText = n.toLocaleTimeString('pt-BR');
            document.getElementById('date').innerText = n.toLocaleDateString('pt-BR', {weekday:'long', day:'numeric', month:'long'});
            const d = n.getDay(), h = n.getHours(), m = n.getMinutes();
            document.querySelectorAll('.task').forEach(el => {
                const dw = parseInt(el.closest('.list').dataset.w);
                const [th, tm] = el.querySelector('.time').innerText.split(':').map(Number);
                const b = el.querySelector('.badge'), c = el.querySelector('input').checked;
                b.style.display = (d===dw && !c && (h>th || (h===th && m>=tm))) ? 'inline' : 'none';
            });
        }
        montar(); setInterval(up, 1000); up();
    </script>
</body>
</html>
