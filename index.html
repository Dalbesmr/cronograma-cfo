<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard CFO | PMMG</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #C5A059;
            --navy: #003366;
            --navy-light: #004a94;
            --bg: #f0f2f5;
            --white: #ffffff;
            --danger: #ff4d4d;
            --success: #00b894;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg);
            margin: 0; padding: 0;
            color: #2d3436;
        }

        header {
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
            color: white;
            padding: 40px 20px 80px;
            text-align: center;
            border-bottom: 6px solid var(--gold);
            clip-path: ellipse(150% 100% at 50% 0%);
        }

        .pmmg-brand { font-size: 3rem; font-weight: 900; letter-spacing: 10px; margin: 0; color: var(--gold); text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        header h1 { font-size: 1rem; margin: 10px 0; opacity: 0.9; text-transform: uppercase; }

        nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: -30px;
            padding: 0 10px;
            position: sticky;
            top: 20px;
            z-index: 100;
        }

        nav a {
            background: var(--white);
            color: var(--navy);
            padding: 12px 18px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            font-size: 0.65rem;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
            cursor: pointer;
        }

        nav a.active { background: var(--gold); color: white; transform: translateY(-3px); }

        .container { max-width: 600px; margin: 30px auto 100px; padding: 0 20px; }

        .status-card {
            background: var(--white);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        #clock { font-size: 2.5rem; font-weight: 900; color: var(--navy); display: block; }
        #current-day-display { font-weight: 800; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; }

        /* CARDS DE MATÉRIA */
        .task-card {
            background: var(--white);
            border-radius: 18px;
            margin-bottom: 15px;
            padding: 18px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 2px solid transparent;
            transition: 0.3s;
        }

        .task-card.completed { border-color: var(--success); opacity: 0.6; background: #f8f9fa; }
        .task-card.overdue { border-color: var(--danger); background: #fff5f5; animation: pulse-danger 2s infinite; }

        @keyframes pulse-danger {
            0% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 77, 77, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0); }
        }

        .icon-box { width: 45px; height: 45px; background: #edf2f7; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; color: var(--navy); flex-shrink: 0; }
        .task-content { flex-grow: 1; }
        .task-name { font-weight: 800; font-size: 0.95rem; color: var(--navy); display: block; }
        .task-obs { font-size: 0.75rem; color: #718096; font-weight: 600; display: block; }
        .task-time { font-size: 0.65rem; font-weight: 900; color: var(--gold); text-transform: uppercase; }

        .check-btn { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #e2e8f0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        input[type="checkbox"] { display: none; }
        input[type="checkbox"]:checked + .check-btn { background: var(--success); border-color: var(--success); color: white; }

        /* ABA EVOLUÇÃO */
        .progresso-container { text-align: center; }
        .circle-progress {
            width: 140px; height: 140px;
            border-radius: 50%;
            background: conic-gradient(var(--gold) 0%, #eee 0%);
            margin: 20px auto;
            display: flex;
            align-items: center; justify-content: center;
            position: relative;
        }
        .circle-progress::after {
            content: attr(data-value);
            position: absolute;
            width: 115px; height: 115px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center; justify-content: center;
            font-size: 1.8rem; font-weight: 900; color: var(--navy);
        }

        .materia-prog-card {
            background: white; padding: 15px 20px; border-radius: 15px; margin-bottom: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            display: flex; justify-content: space-between; align-items: center;
            border-left: 5px solid var(--navy);
        }

        /* Paginação */
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .next-day-area { margin-top: 30px; text-align: center; }
        .btn-next { background: var(--navy); color: white; border: none; padding: 15px 35px; border-radius: 50px; font-weight: 900; font-size: 0.9rem; cursor: pointer; transition: 0.3s; width: 100%; }
        .btn-next:disabled { background: #cbd5e0; cursor: not-allowed; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; backdrop-filter: blur(5px); }
        .modal-content { background: white; width: 85%; max-width: 320px; margin: 20vh auto; padding: 30px; border-radius: 20px; text-align: center; }
        .modal input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 1rem; text-align: center; }
        .modal button { background: var(--navy); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: 900; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <p class="pmmg-brand">PMMG</p>
    <h1>Área do Aluno • MISSÃO CFO 2026</h1>
</header>

<nav>
    <a onclick="switchTab('missao')" id="tab-missao" class="active"><i class="fas fa-crosshairs"></i> Missão</a>
    <a onclick="switchTab('evolucao')" id="tab-evolucao"><i class="fas fa-chart-line"></i> Evolução</a>
    <a onclick="switchTab('questoes')" id="tab-questoes"><i class="fas fa-graduation-cap"></i> Questões</a>
</nav>

<div class="container">
    
    <div id="page-missao" class="page active">
        <div class="status-card">
            <span id="current-day-display">Segunda-Feira</span>
            <span id="clock">00:00:00</span>
            <small id="date-text" style="color:#a0aec0; font-weight:bold;"></small>
        </div>

        <div id="tasks-container"></div>

        <div class="next-day-area">
            <button class="btn-next" id="btn-proximo" onclick="avancarDia()" disabled>
                CUMPRIR MISSÃO DO DIA <i class="fas fa-arrow-right"></i>
            </button>
            <p id="lock-msg" style="font-size: 0.7rem; color: #a0aec0; margin-top: 10px; font-weight: bold;">
                (Bloqueado: Complete todas as tarefas acima)
            </p>
        </div>
    </div>

    <div id="page-evolucao" class="page">
        <div class="status-card progresso-container">
            <h2 style="margin:0; color:var(--navy); font-size: 1.2rem;">Progresso Global do Edital</h2>
            <div class="circle-progress" id="global-circle" data-value="0%"></div>
            <p style="font-size: 0.75rem; font-weight: bold; color: #718096; text-transform: uppercase;">Meta: Prova Dezembro 2026</p>
        </div>
        <div id="materias-evolucao-list"></div>
    </div>

    <div id="page-questoes" class="page">
        <div class="status-card">
            <h2 style="margin:0; color:var(--navy); font-size: 1.2rem;">Seu Ranking de Performance</h2>
            <div style="display: flex; justify-content: space-around; margin-top: 25px;">
                <div style="text-align: center;">
                    <span id="total-q" style="font-size: 2.2rem; font-weight: 900; color: var(--navy);">0</span>
                    <br><small style="font-weight: 800; color: #cbd5e0;">RESOLVIDAS</small>
                </div>
                <div style="text-align: center;">
                    <span id="perc-q" style="font-size: 2.2rem; font-weight: 900; color: var(--success);">0%</span>
                    <br><small style="font-weight: 800; color: #cbd5e0;">ACERTO MÉDIO</small>
                </div>
            </div>
        </div>
        <button onclick="localStorage.clear(); location.reload();" style="width: 100%; border: none; background: none; color: #a0aec0; font-weight: bold; font-size: 0.7rem; cursor: pointer;">Limpar Todos os Dados</button>
    </div>
</div>

<div id="modal-q" class="modal">
    <div class="modal-content">
        <i class="fas fa-pen-to-square" style="font-size: 2rem; color: var(--gold); margin-bottom: 10px;"></i>
        <h3 style="margin: 0; color: var(--navy);">QAP! Resultado:</h3>
        <input type="number" id="in-tot" placeholder="Total de questões">
        <input type="number" id="in-hit" placeholder="Número de acertos">
        <button onclick="salvarQuestao()">GRAVAR RESULTADO</button>
    </div>
</div>

<script>
    const cronograma = {
        1: { d: "Segunda-feira", tarefas: [
            { h: "13:30", m: "Revisão Processo Penal", o: "Revisão 24h", i: "fa-history" },
            { h: "13:45", m: "Português", o: "Morfologia (Pág 1-15) + 10Q", i: "fa-language", q: true },
            { h: "14:45", m: "Dir. Constitucional", o: "Princípios (Pág 1-12) + 10Q", i: "fa-balance-scale", q: true },
            { h: "16:00", m: "Direito Penal", o: "Lei Penal no Tempo + 5Q", i: "fa-gavel", q: true },
            { h: "17:00", m: "Processo Penal", o: "Inquérito Policial + 15Q", i: "fa-handcuffs", q: true }
        ]},
        2: { d: "Terça-feira", tarefas: [
            { h: "13:30", m: "Revisão Penal", o: "Revisão 24h", i: "fa-history" },
            { h: "13:45", m: "Português", o: "Morfologia (Pág 16-30) + 10Q", i: "fa-language", q: true },
            { h: "14:45", m: "Dir. Constitucional", o: "Direitos Individuais + 10Q", i: "fa-balance-scale", q: true },
            { h: "16:00", m: "Dir. Administrativo", o: "Regime Jurídico + 5Q", i: "fa-university", q: true },
            { h: "17:00", m: "Processo Civil", o: "Normas Processuais + 15Q", i: "fa-file-signature", q: true }
        ]},
        3: { d: "Quarta-feira", tarefas: [
            { h: "13:30", m: "Revisão Administrativo", o: "Revisão 24h", i: "fa-history" },
            { h: "13:45", m: "Português", o: "Semântica + 10Q", i: "fa-language", q: true },
            { h: "14:45", m: "Dir. Constitucional", o: "Controle de Const. + 10Q", i: "fa-balance-scale", q: true },
            { h: "16:00", m: "Direito Penal", o: "Teoria do Crime + 5Q", i: "fa-gavel", q: true },
            { h: "17:00", m: "Legislação Extravagante", o: "Leis Especiais + 15Q", i: "fa-id-badge", q: true }
        ]},
        4: { d: "Quinta-feira", tarefas: [
            { h: "13:30", m: "Revisão Civil", o: "Revisão 24h", i: "fa-history" },
            { h: "13:45", m: "Português", o: "Sintaxe + 10Q", i: "fa-language", q: true },
            { h: "14:45", m: "Dir. Constitucional", o: "Poder Judiciário + 10Q", i: "fa-balance-scale", q: true },
            { h: "16:00", m: "Processo Penal", o: "Ação Penal + 5Q", i: "fa-handcuffs", q: true },
            { h: "17:00", m: "Dir. Administrativo", o: "Atos Admin + 15Q", i: "fa-university", q: true }
        ]},
        5: { d: "Sexta-feira", tarefas: [
            { h: "13:30", m: "Revisão Constitucional", o: "Revisão 24h", i: "fa-history" },
            { h: "13:45", m: "Português", o: "Redação + 20Q", i: "fa-pen-fancy", q: true },
            { h: "14:45", m: "Dir. Constitucional", o: "Org. do Estado + 20Q", i: "fa-balance-scale", q: true },
            { h: "16:00", m: "Direito Civil", o: "Sujeitos do Processo + 5Q", i: "fa-file-signature", q: true },
            { h: "17:40", m: "Revisão Semanal", o: "Geral", i: "fa-chart-pie" }
        ]}
    };

    let currentDay = parseInt(localStorage.getItem('dayIndex')) || 1;
    let activeQId = null;

    function renderMissao() {
        const container = document.getElementById('tasks-container');
        const data = cronograma[currentDay];
        document.getElementById('current-day-display').innerText = data.d;

        container.innerHTML = data.tarefas.map((t, i) => {
            const id = `task-${currentDay}-${i}`;
            const done = localStorage.getItem(id) === 'true';
            
            const now = new Date();
            const [h, m] = t.h.split(':').map(Number);
            const isToday = now.getDay() === currentDay;
            const isOverdue = isToday && !done && (now.getHours() > h || (now.getHours() === h && now.getMinutes() > m));

            return `
                <div class="task-card ${done ? 'completed' : ''} ${isOverdue ? 'overdue' : ''}">
                    <div class="icon-box"><i class="fas ${t.i}"></i></div>
                    <div class="task-content">
                        <span class="task-time">${t.h}</span>
                        <span class="task-name">${t.m}</span>
                        <span class="task-obs">${t.o}</span>
                    </div>
                    <label>
                        <input type="checkbox" onchange="markTask('${id}', ${t.q || false}, this.checked)" ${done ? 'checked' : ''}>
                        <div class="check-btn"><i class="fas fa-check"></i></div>
                    </label>
                </div>
            `;
        }).join('');
        checkLock();
    }

    function markTask(id, isQ, checked) {
        localStorage.setItem(id, checked);
        if (checked && isQ) {
            activeQId = id;
            document.getElementById('modal-q').style.display = 'block';
        }
        renderMissao();
    }

    function salvarQuestao() {
        localStorage.setItem(activeQId + '-tot', document.getElementById('in-tot').value);
        localStorage.setItem(activeQId + '-hit', document.getElementById('in-hit').value);
        document.getElementById('modal-q').style.display = 'none';
        updateStats();
    }

    function checkLock() {
        const total = cronograma[currentDay].tarefas.length;
        let done = 0;
        for(let i=0; i<total; i++) {
            if(localStorage.getItem(`task-${currentDay}-${i}`) === 'true') done++;
        }
        const isDone = done === total;
        document.getElementById('btn-proximo').disabled = !isDone;
        document.getElementById('lock-msg').style.display = isDone ? 'none' : 'block';
    }

    function avancarDia() {
        // Incrementa o contador de dias concluídos para o progresso global
        let totalFeitos = parseInt(localStorage.getItem('totalDiasFeitos')) || 0;
        localStorage.setItem('totalDiasFeitos', totalFeitos + 1);

        currentDay = currentDay < 5 ? currentDay + 1 : 1;
        localStorage.setItem('dayIndex', currentDay);
        renderMissao();
        window.scrollTo(0,0);
    }

    function switchTab(tab) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
        document.getElementById('page-' + tab).classList.add('active');
        document.getElementById('tab-' + tab).classList.add('active');
        
        if(tab === 'evolucao') updateEvolucaoUI();
        if(tab === 'questoes') updateStats();
    }

    function updateEvolucaoUI() {
        const totalDiasEdital = 120; // Estimativa de 120 dias de estudo até a prova
        const diasConcluidos = parseInt(localStorage.getItem('totalDiasFeitos')) || 0;
        const percGlobal = Math.min(Math.round((diasConcluidos / totalDiasEdital) * 100), 100);
        
        const circle = document.getElementById('global-circle');
        circle.style.background = `conic-gradient(var(--gold) ${percGlobal}%, #eee 0%)`;
        circle.setAttribute('data-value', percGlobal + '%');

        const materias = ["Português", "Dir. Constitucional", "Direito Penal", "Dir. Administrativo", "Processo Penal", "Processo Civil"];
        document.getElementById('materias-evolucao-list').innerHTML = materias.map(m => `
            <div class="materia-prog-card">
                <span style="font-weight:800; font-size:0.75rem; color:var(--navy); text-transform: uppercase;">${m}</span>
                <span style="font-weight:900; color:var(--gold); font-size: 0.9rem;">${Math.min(100, Math.floor(percGlobal * (1 + Math.random()*0.2)))}%</span>
            </div>
        `).join('');
    }

    function updateStats() {
        let tt = 0, th = 0;
        for (let i = 0; i < localStorage.length; i++){
            let key = localStorage.key(i);
            if (key.endsWith('-tot')) tt += parseInt(localStorage.getItem(key)) || 0;
            if (key.endsWith('-hit')) th += parseInt(localStorage.getItem(key)) || 0;
        }
        document.getElementById('total-q').innerText = tt;
        document.getElementById('perc-q').innerText = tt > 0 ? Math.round((th/tt)*100) + '%' : '0%';
    }

    setInterval(() => {
        const n = new Date();
        document.getElementById('clock').innerText = n.toLocaleTimeString('pt-BR');
        document.getElementById('date-text').innerText = n.toLocaleDateString('pt-BR', {day:'numeric', month:'long'});
    }, 1000);

    renderMissao();
</script>
</body>
</html>
