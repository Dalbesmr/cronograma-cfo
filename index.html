<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard CFO | PMMG</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #C5A059;
            --gold-dark: #b08d4a;
            --navy: #003366;
            --bg: #f8f9fa;
            --white: #ffffff;
            --danger: #ff4d4d;
            --success: #00b894;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(#d1d5db 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            margin: 0; padding: 0;
            color: #2d3436;
            display: none; /* Esconde o site até a senha ser validada */
        }

        header {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            color: #000;
            padding: 45px 20px 85px;
            text-align: center;
            border-bottom: 6px solid var(--navy);
            clip-path: ellipse(150% 100% at 50% 0%);
        }

        .pmmg-brand { font-size: 3.5rem; font-weight: 900; letter-spacing: 12px; margin: 0; color: black; }
        
        nav {
            display: flex; justify-content: center; gap: 12px;
            margin-top: -35px; padding: 0 10px; position: sticky; top: 20px; z-index: 100;
        }

        nav a {
            background: var(--navy); color: white; padding: 14px 22px;
            border-radius: 50px; text-decoration: none; font-weight: 800; font-size: 0.65rem;
            text-transform: uppercase; box-shadow: 0 8px 20px rgba(0,0,0,0.2); cursor: pointer; border: 2px solid var(--gold);
        }

        nav a.active { background: var(--white); color: var(--navy); transform: translateY(-5px); border-color: var(--navy); }

        .container { max-width: 600px; margin: 40px auto 120px; padding: 0 20px; }

        .status-card {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            padding: 25px; border-radius: 25px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.06); margin-bottom: 35px;
        }

        #clock { font-size: 2.8rem; font-weight: 900; color: var(--navy); display: block; }
        #current-day-display { font-weight: 900; color: var(--gold-dark); text-transform: uppercase; letter-spacing: 3px; }

        .task-card { background: var(--white); border-radius: 20px; margin-bottom: 18px; padding: 20px; display: flex; align-items: center; gap: 18px; border: 2px solid transparent; transition: 0.3s; }
        .task-card.completed { border-color: var(--success); opacity: 0.55; }
        .task-card.overdue { border-color: var(--danger); background: #fffafa; animation: pulse-danger 2s infinite; }

        @keyframes pulse-danger { 0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); } 70% { box-shadow: 0 0 0 12px rgba(231, 76, 60, 0); } 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); } }

        .icon-box { width: 48px; height: 48px; background: #f1f3f5; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: var(--navy); flex-shrink: 0; }
        .task-content { flex-grow: 1; }
        .task-name { font-weight: 800; font-size: 1rem; color: var(--navy); display: block; }
        .task-obs { font-size: 0.75rem; color: #7f8c8d; font-weight: 600; display: block; }

        .check-btn { width: 32px; height: 32px; border-radius: 50%; border: 3px solid #e9ecef; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        input[type="checkbox"] { display: none; }
        input[type="checkbox"]:checked + .check-btn { background: var(--success); border-color: var(--success); color: white; }

        .circle-progress {
            width: 160px; height: 160px; border-radius: 50%; background: conic-gradient(var(--navy) 0%, #eee 0%);
            margin: 25px auto; display: flex; align-items: center; justify-content: center; position: relative;
        }
        .circle-progress::after {
            content: attr(data-value); position: absolute; width: 130px; height: 130px; background: white;
            border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: 900; color: var(--navy);
        }

        .materia-prog-card { background: white; padding: 18px 25px; border-radius: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid var(--gold); }

        .page { display: none; }
        .page.active { display: block; animation: fadeInUp 0.5s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .btn-next { background: var(--navy); color: white; border: 2px solid var(--gold); padding: 18px 35px; border-radius: 50px; font-weight: 900; cursor: pointer; width: 100%; }
        .btn-next:disabled { background: #bdc3c7; border-color: #bdc3c7; cursor: not-allowed; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; backdrop-filter: blur(8px); }
        .modal-content { background: white; width: 85%; max-width: 320px; margin: 20vh auto; padding: 35px; border-radius: 30px; text-align: center; }
        .modal input { width: 100%; padding: 15px; margin: 12px 0; border: 2px solid #f1f3f5; border-radius: 15px; box-sizing: border-box; font-size: 1.1rem; text-align: center; }
        .modal button { background: var(--navy); color: white; border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <p class="pmmg-brand">PMMG</p>
    <h1>Área do Aluno • MISSÃO CFO 2026</h1>
</header>

<nav>
    <a onclick="switchTab('missao')" id="tab-missao" class="active"><i class="fas fa-crosshairs"></i> Missão</a>
    <a onclick="switchTab('evolucao')" id="tab-evolucao"><i class="fas fa-chart-line"></i> Evolução</a>
    <a onclick="switchTab('questoes')" id="tab-questoes"><i class="fas fa-graduation-cap"></i> Questões</a>
</nav>

<div class="container">
    <div id="page-missao" class="page active">
        <div class="status-card">
            <span id="current-day-display">Segunda-Feira</span>
            <span id="clock">00:00:00</span>
            <small id="date-text" style="color:var(--gold-dark); font-weight:800; text-transform: uppercase; font-size: 0.7rem;"></small>
        </div>
        <div id="tasks-container"></div>
        <div class="next-day-area" style="margin-top: 40px;">
            <button class="btn-next" id="btn-proximo" onclick="avancarDia()" disabled>CUMPRIR MISSÃO DO DIA <i class="fas fa-arrow-right"></i></button>
            <p id="lock-msg" style="font-size: 0.75rem; color: #95a5a6; margin-top: 12px; font-weight: bold; text-align: center;">Bloqueado: Complete as tarefas do dia</p>
        </div>
    </div>

    <div id="page-evolucao" class="page">
        <div class="status-card">
            <h2 style="margin:0; color:var(--navy); font-size: 1.3rem;">Progresso do Edital</h2>
            <div class="circle-progress" id="global-circle" data-value="0%"></div>
        </div>
        <div id="materias-evolucao-list"></div>
    </div>

    <div id="page-questoes" class="page">
        <div class="status-card">
            <h2 style="margin:0; color:var(--navy); font-size: 1.3rem;">Ranking de Performance</h2>
            <div style="display: flex; justify-content: space-around; margin-top: 30px;">
                <div style="text-align: center;"><span id="total-q" style="font-size: 2.5rem; font-weight: 900; color: var(--navy);">0</span><br><small>QUESTÕES</small></div>
                <div style="text-align: center;"><span id="perc-q" style="font-size: 2.5rem; font-weight: 900; color: var(--success);">0%</span><br><small>ACERTO</small></div>
            </div>
        </div>
        <button onclick="if(confirm('Resetar sistema?')) { localStorage.clear(); location.reload(); }" style="width: 100%; border: none; background: none; color: #bdc3c7; font-weight: bold; font-size: 0.7rem; cursor: pointer; padding: 20px;">RESETAR SISTEMA</button>
    </div>
</div>

<div id="modal-q" class="modal">
    <div class="modal-content">
        <h3>Resultado</h3>
        <input type="number" id="in-tot" placeholder="Total">
        <input type="number" id="in-hit" placeholder="Acertos">
        <button onclick="salvarQuestao()">GRAVAR</button>
    </div>
</div>

<script>
    // --- SISTEMA DE SENHA (Ajuste a senha aqui) ---
    const MINHA_SENHA = "CFO2026"; 

    function verificarAcesso() {
        if (localStorage.getItem('acesso_pmmg') === 'true') {
            document.body.style.display = 'block';
            renderMissao();
        } else {
            let p = prompt("IDENTIFIQUE-SE - ACESSO RESTRITO PMMG:");
            if (p === MINHA_SENHA) {
                localStorage.setItem('acesso_pmmg', 'true');
                document.body.style.display = 'block';
                renderMissao();
            } else {
                alert("ACESSO NEGADO.");
                window.location.reload();
            }
        }
    }

    const cronograma = {
        1: { d: "Segunda-feira", tarefas: [{h:"13:30", m:"Revisão Processo Penal", o:"24h", i:"fa-history"}, {h:"13:45", m:"Português", o:"Morfologia + 10Q", i:"fa-language", q:true}, {h:"14:45", m:"Dir. Constitucional", o:"Princípios + 10Q", i:"fa-balance-scale", q:true}, {h:"16:00", m:"Direito Penal", o:"Teoria + 5Q", i:"fa-gavel", q:true}, {h:"17:00", m:"Processo Penal", o:"Inquérito + 15Q", i:"fa-handcuffs", q:true}]},
        2: { d: "Terça-feira", tarefas: [{h:"13:30", m:"Revisão Penal", o:"24h", i:"fa-history"}, {h:"13:45", m:"Português", o:"Morfologia + 10Q", i:"fa-language", q:true}, {h:"14:45", m:"Dir. Constitucional", o:"Direitos + 10Q", i:"fa-balance-scale", q:true}, {h:"16:00", m:"Dir. Administrativo", o:"Regime + 5Q", i:"fa-university", q:true}, {h:"17:00", m:"Processo Civil", o:"Normas + 15Q", i:"fa-file-signature", q:true}]},
        3: { d: "Quarta-feira", tarefas: [{h:"13:30", m:"Revisão Adm", o:"24h", i:"fa-history"}, {h:"13:45", m:"Português", o:"Semântica + 10Q", i:"fa-language", q:true}, {h:"14:45", m:"Dir. Constitucional", o:"Controle + 10Q", i:"fa-balance-scale", q:true}, {h:"16:00", m:"Direito Penal", o:"Teoria do Crime + 5Q", i:"fa-gavel", q:true}, {h:"17:00", m:"Leg. Extravagante", o:"Leis + 15Q", i:"fa-id-badge", q:true}]},
        4: { d: "Quinta-feira", tarefas: [{h:"13:30", m:"Revisão Civil", o:"24h", i:"fa-history"}, {h:"13:45", m:"Português", o:"Sintaxe + 10Q", i:"fa-language", q:true}, {h:"14:45", m:"Dir. Constitucional", o:"Judiciário + 10Q", i:"fa-balance-scale", q:true}, {h:"16:00", m:"Processo Penal", o:"Ação Penal + 5Q", i:"fa-handcuffs", q:true}, {h:"17:00", m:"Dir. Administrativo", o:"Atos + 15Q", i:"fa-university", q:true}]},
        5: { d: "Sexta-feira", tarefas: [{h:"13:30", m:"Revisão Const", o:"24h", i:"fa-history"}, {h:"13:45", m:"Português", o:"Redação + 20Q", i:"fa-pen-fancy", q:true}, {h:"14:45", m:"Dir. Constitucional", o:"Org. Estado + 20Q", i:"fa-balance-scale", q:true}, {h:"16:00", m:"Direito Civil", o:"Sujeitos + 5Q", i:"fa-file-signature", q:true}, {h:"17:40", m:"Revisão Semanal", o:"Check", i:"fa-chart-pie"}]}
    };

    let currentDay = parseInt(localStorage.getItem('dayIndex')) || 1;
    let activeQId = null;

    function renderMissao() {
        const container = document.getElementById('tasks-container');
        const data = cronograma[currentDay];
        document.getElementById('current-day-display').innerText = data.d;
        container.innerHTML = data.tarefas.map((t, i) => {
            const id = `task-${currentDay}-${i}`;
            const done = localStorage.getItem(id) === 'true';
            const now = new Date();
            const [h, m] = t.h.split(':').map(Number);
            const isToday = now.getDay() === currentDay;
            const isOverdue = isToday && !done && (now.getHours() > h || (now.getHours() === h && now.getMinutes() > m));
            return `
                <div class="task-card ${done ? 'completed' : ''} ${isOverdue ? 'overdue' : ''}">
                    <div class="icon-box"><i class="fas ${t.i}"></i></div>
                    <div class="task-content">
                        <span class="task-time">${t.h}</span><span class="task-name">${t.m}</span><span class="task-obs">${t.o}</span>
                    </div>
                    <label><input type="checkbox" onchange="markTask('${id}', ${t.q || false}, this.checked)" ${done ? 'checked' : ''}><div class="check-btn"><i class="fas fa-check"></i></div></label>
                </div>`;
        }).join('');
        checkLock();
    }

    function markTask(id, isQ, checked) {
        localStorage.setItem(id, checked);
        if (checked && isQ) { activeQId = id; document.getElementById('modal-q').style.display = 'block'; }
        renderMissao();
    }

    function salvarQuestao() {
        localStorage.setItem(activeQId + '-tot', document.getElementById('in-tot').value);
        localStorage.setItem(activeQId + '-hit', document.getElementById('in-hit').value);
        document.getElementById('modal-q').style.display = 'none';
        updateStats();
    }

    function checkLock() {
        const total = cronograma[currentDay].tarefas.length;
        let done = 0;
        for(let i=0; i<total; i++) { if(localStorage.getItem(`task-${currentDay}-${i}`) === 'true') done++; }
        const isDone = done === total;
        document.getElementById('btn-proximo').disabled = !isDone;
        document.getElementById('lock-msg').style.display = isDone ? 'none' : 'block';
    }

    function avancarDia() {
        let totalFeitos = parseInt(localStorage.getItem('totalDiasFeitos')) || 0;
        localStorage.setItem('totalDiasFeitos', totalFeitos + 1);
        currentDay = currentDay < 5 ? currentDay + 1 : 1;
        localStorage.setItem('dayIndex', currentDay);
        renderMissao();
        window.scrollTo(0,0);
    }

    function switchTab(tab) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
        document.getElementById('page-' + tab).classList.add('active');
        document.getElementById('tab-' + tab).classList.add('active');
        if(tab === 'evolucao') updateEvolucaoUI();
        if(tab === 'questoes') updateStats();
    }

    function updateEvolucaoUI() {
        const percGlobal = Math.min(Math.round(((parseInt(localStorage.getItem('totalDiasFeitos')) || 0) / 120) * 100), 100);
        const circle = document.getElementById('global-circle');
        circle.style.background = `conic-gradient(var(--navy) ${percGlobal}%, #eee 0%)`;
        circle.setAttribute('data-value', percGlobal + '%');
        document.getElementById('materias-evolucao-list').innerHTML = ["Português", "Dir. Constitucional", "Direito Penal", "Dir. Administrativo"].map(m => `
            <div class="materia-prog-card"><span>${m}</span><span>${Math.min(100, Math.floor(percGlobal * 1.1))}%</span></div>
        `).join('');
    }

    function updateStats() {
        let tt = 0, th = 0;
        for (let i = 0; i < localStorage.length; i++){
            let key = localStorage.key(i);
            if (key.endsWith('-tot')) tt += parseInt(localStorage.getItem(key)) || 0;
            if (key.endsWith('-hit')) th += parseInt(localStorage.getItem(key)) || 0;
        }
        document.getElementById('total-q').innerText = tt;
        document.getElementById('perc-q').innerText = tt > 0 ? Math.round((th/tt)*100) + '%' : '0%';
    }

    setInterval(() => {
        const n = new Date();
        document.getElementById('clock').innerText = n.toLocaleTimeString('pt-BR');
        document.getElementById('date-text').innerText = n.toLocaleDateString('pt-BR', {day:'numeric', month:'long'});
    }, 1000);

    // Inicia a verificação de acesso ao carregar
    verificarAcesso();
</script>
</body>
</html>
