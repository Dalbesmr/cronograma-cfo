<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Aluno - CFO/MG</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C5A059; --navy: #003366; --bg: #f4f7f6; --success: #2ecc71; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        /* Cabeçalho Premium */
        header { background: var(--gold); padding: 30px 20px; text-align: center; border-bottom: 5px solid var(--navy); }
        .logo-text { font-size: 2.5rem; font-weight: 900; color: var(--navy); letter-spacing: 5px; margin: 0; }
        header h1 { margin: 5px 0; font-size: 1.5rem; color: #333; }
        header p { margin: 0; color: white; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; font-size: 0.8rem; }

        /* Menu */
        nav { background: var(--navy); display: flex; justify-content: center; padding: 12px; gap: 30px; }
        nav a { color: white; text-decoration: none; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; }
        nav a:hover { color: var(--gold); }

        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        
        /* Relógio Centralizado */
        .status-bar { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; margin-bottom: 25px; }
        #clock { font-size: 2rem; font-weight: 900; color: var(--navy); margin: 0; }
        #date { color: #888; font-weight: bold; text-transform: capitalize; }

        /* Layout em Colunas (Dashboard) */
        .dashboard-grid { display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-start; }
        .col-left { flex: 2; min-width: 300px; display: flex; flex-direction: column; gap: 20px; }
        .col-right { flex: 1; min-width: 300px; }

        .study-box { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 5px solid var(--navy); }
        .box-header { background: #f8f9fa; padding: 15px 20px; font-weight: 800; color: var(--navy); border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        
        .task-list { padding: 10px 0; }
        .task-item { display: flex; align-items: center; padding: 12px 20px; border-bottom: 1px solid #f1f1f1; cursor: pointer; }
        .task-item:last-child { border-bottom: none; }
        
        input[type="checkbox"] { width: 20px; height: 20px; margin-right: 15px; accent-color: var(--navy); }
        .time { font-size: 0.75rem; font-weight: 900; background: var(--navy); color: white; padding: 3px 7px; border-radius: 4px; margin-right: 12px; }
        .task-label { font-weight: 600; font-size: 0.9rem; flex-grow: 1; }

        /* Card de Questões (Estatísticas) */
        .stats-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); border-left: 8px solid var(--gold); }
        .stats-card h3 { margin: 0 0 20px; color: var(--navy); display: flex; align-items: center; gap: 10px; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 15px; text-align: center; }
        .stat-val { display: block; font-size: 1.8rem; font-weight: 900; color: var(--navy); }
        .stat-lbl { font-size: 0.7rem; color: #888; font-weight: bold; text-transform: uppercase; }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
        .modal-content { background: white; width: 90%; max-width: 350px; margin: 15vh auto; padding: 25px; border-radius: 15px; text-align: center; border-top: 8px solid var(--gold); }
        .modal h2 { color: var(--navy); margin-top: 0; }
        .modal input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .modal button { background: var(--navy); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }

        @media (max-width: 768px) { .dashboard-grid { flex-direction: column; } .col-left, .col-right { width: 100%; flex: none; } }
    </style>
</head>
<body>

<header>
    <p class="logo-text">PMMG</p>
    <h1>Área do Aluno - CFO/MG</h1>
    <p>Rumo à Gloriosa</p>
</header>

<nav>
    <a href="#">Dashboard</a>
    <a href="#">Grade de Estudos</a>
    <a href="#">Questões</a>
</nav>

<div class="container">
    <div class="status-bar">
        <p id="clock">00:00:00</p>
        <div id="date">Segunda-Feira, 9 de Março</div>
    </div>

    <div class="dashboard-grid">
        <div class="col-left">
            <div class="study-box">
                <div class="box-header">TEORIA <i class="fas fa-book"></i></div>
                <div class="task-list" id="theory-list"></div>
            </div>
            
            <div class="study-box">
                <div class="box-header">ATIVIDADE <i class="fas fa-pen-nib"></i></div>
                <div class="task-list" id="activity-list"></div>
            </div>
        </div>

        <div class="col-right">
            <div class="stats-card">
                <h3>📊 RESUMO GERAL</h3>
                <div class="stat-row">
                    <div><span class="stat-val" id="total-q">0</span><span class="stat-lbl">Questões</span></div>
                    <div><span class="stat-val" id="perc-q">0%</span><span class="stat-lbl">Acerto</span></div>
                </div>
                <div style="border-top: 1px solid #eee; padding-top: 15px; margin-top: 15px;">
                    <div style="display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 8px;">
                        <strong>Constitucional</strong> <span id="const-perc">0%</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 0.8rem;">
                        <strong>Português</strong> <span id="port-perc">0%</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="q-modal" class="modal">
    <div class="modal-content">
        <h2>Registrar Meta</h2>
        <p id="modal-task-name" style="font-weight: bold; color: var(--gold);"></p>
        <input type="number" id="in-total" placeholder="Total de questões">
        <input type="number" id="in-right" placeholder="Total de acertos">
        <button onclick="confirmTask()">SALVAR RESULTADO</button>
    </div>
</div>

<script>
    const theory = [
        { h: "13:30", t: "Revisão Processo Penal (Revisão 24h)" },
        { h: "13:45", t: "Português (Teoria)" }
    ];

    const activities = [
        { h: "14:45", t: "Direito Constitucional (10 questões)", cat: "const" },
        { h: "15:45", t: "Pausa (15 min)", cat: "none" }
    ];

    let currentTask = null;

    function render() {
        // Render Teoria
        document.getElementById('theory-list').innerHTML = theory.map((x, i) => {
            const id = `t-${i}`;
            const chk = localStorage.getItem(id) === 'true' ? 'checked' : '';
            return `<label class="task-item">
                <input type="checkbox" onchange="localStorage.setItem('${id}', this.checked)" ${chk}>
                <span class="time">${x.h}</span><span class="task-label">${x.t}</span>
            </label>`;
        }).join('');

        // Render Atividade
        document.getElementById('activity-list').innerHTML = activities.map((x, i) => {
            const id = `a-${i}`;
            const chk = localStorage.getItem(id) === 'true' ? 'checked' : '';
            return `<label class="task-item">
                <input type="checkbox" onchange="openModal('${id}', '${x.t}', '${x.cat}')" ${chk} id="chk-${id}">
                <span class="time">${x.h}</span><span class="task-label">${x.t}</span>
            </label>`;
        }).join('');
        updateStats();
    }

    function openModal(id, name, cat) {
        if (cat === 'none') { localStorage.setItem(id, 'true'); return; }
        if (document.getElementById('chk-'+id).checked) {
            currentTask = { id, cat };
            document.getElementById('modal-task-name').innerText = name;
            document.getElementById('q-modal').style.display = 'block';
        } else {
            localStorage.setItem(id, 'false');
            localStorage.removeItem(id + '-tot');
            localStorage.removeItem(id + '-rig');
            updateStats();
        }
    }

    function confirmTask() {
        const tot = parseInt(document.getElementById('in-total').value) || 0;
        const rig = parseInt(document.getElementById('in-right').value) || 0;
        localStorage.setItem(currentTask.id, 'true');
        localStorage.setItem(currentTask.id + '-tot', tot);
        localStorage.setItem(currentTask.id + '-rig', rig);
        localStorage.setItem(currentTask.id + '-cat', currentTask.cat);
        document.getElementById('q-modal').style.display = 'none';
        updateStats();
    }

    function updateStats() {
        let totalQ = 0, totalR = 0;
        activities.forEach((_, i) => {
            totalQ += parseInt(localStorage.getItem(`a-${i}-tot`)) || 0;
            totalR += parseInt(localStorage.getItem(`a-${i}-rig`)) || 0;
        });
        document.getElementById('total-q').innerText = totalQ;
        document.getElementById('perc-q').innerText = totalQ > 0 ? Math.round((totalR/totalQ)*100)+'%' : '0%';
        // Simulação de categorias para o exemplo
        document.getElementById('const-perc').innerText = document.getElementById('perc-q').innerText;
    }

    function clock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('pt-BR');
        document.getElementById('date').innerText = now.toLocaleDateString('pt-BR', {weekday:'long', day:'numeric', month:'long'});
    }

    render();
    setInterval(clock, 1000);
    clock();
</script>
</body>
</html>
