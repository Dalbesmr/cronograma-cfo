<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QAP | Cronograma PMMG</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --pm-navy: #003366; /* Azul Oficial PMMG */
            --pm-gold: #C5A059; /* Dourado Oficial */
            --pm-gray: #f4f4f4;
            --danger: #e74c3c;
            --success: #27ae60;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #dee2e6;
            margin: 0; padding: 0;
            color: #212529;
        }

        header {
            background: var(--pm-navy);
            color: white;
            padding: 30px 20px 70px;
            text-align: center;
            border-bottom: 4px solid var(--pm-gold);
            position: relative;
        }

        .logo-pm {
            width: 80px;
            margin-bottom: 10px;
        }

        header h1 { margin: 5px 0; font-size: 1.8rem; font-weight: 900; }
        header p { margin: 0; color: var(--pm-gold); font-weight: bold; letter-spacing: 2px; }

        .container {
            max-width: 650px;
            margin: -50px auto 50px;
            padding: 0 15px;
        }

        .status-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            margin-bottom: 25px;
            text-align: center;
            border-top: 5px solid var(--pm-gold);
        }

        #live-clock { font-size: 2.2rem; font-weight: 900; color: var(--pm-navy); margin: 0; }
        #date-display { text-transform: capitalize; font-weight: bold; color: #666; }

        .day-block {
            background: white;
            border-radius: 8px;
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .day-header {
            background: #e9ecef;
            padding: 12px 20px;
            font-weight: 800;
            color: var(--pm-navy);
            border-bottom: 2px solid var(--pm-gold);
            text-transform: uppercase;
        }

        .task-list { padding: 5px 0; }

        .task-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.2s;
        }

        .task-item:hover { background: #f8f9fa; }
        .task-item:last-child { border-bottom: none; }

        /* Estilo pausa/exercício */
        .task-item.break { background: #fff5f5; color: #c53030; font-weight: bold; }
        .task-item.exercise { background: #f0fff4; color: #276749; font-weight: bold; }

        input[type="checkbox"] {
            width: 22px; height: 22px;
            margin-right: 15px;
            accent-color: var(--pm-navy);
            cursor: pointer;
        }

        .time-tag {
            font-size: 0.85rem; font-weight: 800;
            background: var(--pm-navy); color: white;
            padding: 3px 8px; border-radius: 4px;
            margin-right: 12px; min-width: 50px; text-align: center;
        }

        .task-info { flex-grow: 1; }
        .task-label { font-weight: 700; font-size: 0.95rem; display: block; }
        .task-obs { font-size: 0.75rem; color: #666; font-style: italic; }

        .overdue-badge {
            background: var(--danger); color: white;
            font-size: 0.65rem; padding: 2px 6px;
            border-radius: 4px; font-weight: 900;
            display: none; margin-left: 5px;
        }

        input:checked ~ .task-info .task-label { text-decoration: line-through; color: #adb5bd; }
        input:checked ~ .overdue-badge { display: none !important; }

        .stats-footer {
            background: var(--pm-navy); color: white;
            padding: 25px; border-radius: 12px; margin-top: 30px;
        }

        .stats-footer h3 { color: var(--pm-gold); margin-top: 0; }
        .stats-grid { font-size: 0.85rem; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        footer { text-align: center; padding: 30px; color: #666; font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
