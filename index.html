<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Aluno - CFO/MG</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C5A059; --navy: #003366; --bg: #f0f2f5; --danger: #ff4d4d; --success: #2ecc71; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; }
        
        /* Header & Nav */
        header { background: var(--gold); padding: 30px 20px; text-align: center; border-bottom: 5px solid var(--navy); }
        .brand-logo { font-size: 3rem; font-weight: 900; color: black; letter-spacing: 8px; margin: 0; }
        nav { background: var(--navy); display: flex; justify-content: center; padding: 12px; gap: 25px; sticky: top; z-index: 100; }
        nav a { color: white; text-decoration: none; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; cursor: pointer; opacity: 0.7; }
        nav a.active { opacity: 1; border-bottom: 2px solid var(--gold); }

        .container { max-width: 900px; margin: 20px auto; padding: 0 20px; }
        
        /* Status Bar */
        .status-bar { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); text-align: center; border-top: 4px solid var(--gold); margin-bottom: 25px; }
        #clock { font-size: 2.5rem; font-weight: 900; color: var(--navy); margin: 0; }
        #date { color: #222; font-weight: 800; font-size: 1.1rem; text-transform: capitalize; }

        /* Pages logic */
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Cronograma Styles */
        .day-section { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .day-title { background: var(--navy); color: white; padding: 12px 20px; font-weight: 800; text-transform: uppercase; border-bottom: 3px solid var(--gold); }
        .task-item { display: flex; align-items: center; padding: 12px 20px; border-bottom: 1px solid #eee; cursor: pointer; }
        .task-item.break { background: #fff5f5; color: #c53030; }
        input[type="checkbox"] { width: 20px; height: 20px; margin-right: 15px; accent-color: var(--navy); }
        .time-tag { font-size: 0.75rem; font-weight: 900; background: var(--navy); color: white; padding: 3px 7px; border-radius: 4px; margin-right: 12px; min-width: 45px; text-align: center; }
        .info { flex: 1; }
        .name { font-weight: 700; font-size: 0.9rem; display: block; }
        .obs { font-size: 0.75rem; color: #666; }

        /* Questões Page Styles */
        .stats-hero { background: var(--navy); color: white; padding: 40px; border-radius: 15px; text-align: center; margin-bottom: 25px; border-bottom: 8px solid var(--gold); }
        .big-perc { font-size: 4rem; font-weight: 900; color: var(--gold); display: block; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .stat-card h4 { margin: 0 0 10px; color: #888; text-transform: uppercase; font-size: 0.7rem; }
        .stat-card span { font-size: 1.5rem; font-weight: 900; color: var(--navy); }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
        .modal-content { background: white; width: 300px; margin: 20vh auto; padding: 30px; border-radius: 15px; text-align: center; }
        .modal input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .modal button { background: var(--navy); color: white; border: none; padding: 12px; border-radius: 5px; width: 100%; font-weight: 900; cursor: pointer; }

        footer { text-align: center; padding: 40px; color: #aaa; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <p class="brand-logo">PMMG</p>
    <h1>Área do Aluno - CFO/MG</h1>
    <p>Rumo à Gloriosa</p>
</header>

<nav>
    <a onclick="showPage('grade')" id="nav-grade" class="active">Grade de Estudos</a>
    <a onclick="showPage('questoes')" id="nav-questoes">Questões</a>
</nav>

<div class="container">
    <div class="status-bar">
        <p id="clock">00:00:00</p>
        <div id="date">Carregando...</div>
    </div>

    <div id="page-grade" class="page active">
        <div id="cronograma-render"></div>
    </div>

    <div id="page-questoes" class="page">
        <div class="stats-hero">
            <span class="stat-text" style="text-transform: uppercase; font-weight: 800; opacity: 0.8;">Índice de Acerto Geral</span>
            <span class="big-perc" id="resumo-perc">0%</span>
            <p id="resumo-detalhe">Você realizou 0 questões até agora.</p>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h4>Total de Questões</h4>
                <span id="resumo-total">0</span>
            </div>
            <div class="stat-card">
                <h4>Total de Acertos</h4>
                <span id="resumo-acertos" style="color: var(--success);">0</span>
            </div>
            <div class="stat-card">
                <h4>Total de Erros</h4>
                <span id="resumo-erros" style="color: var(--danger);">0</span>
            </div>
        </div>
        
        <button onclick="clearStats()" style="margin-top: 30px; background: none; border: 1px solid #ccc; color: #999; padding: 10px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold;">Limpar Histórico de Questões</button>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 style="color:var(--navy)">Registrar Desempenho</h3>
        <p id="modal-materia" style="font-weight: bold; color: var(--gold); font-size: 0.8rem;"></p>
        <input type="number" id="in-tot" placeholder="Total de questões feitas">
        <input type="number" id="in-hit" placeholder="Total de acertos">
        <button onclick="salvarQuestao()">Salvar no meu Ranking</button>
        <button onclick="fecharModal()" style="background:#eee; color:#333; margin-top:5px">Cancelar</button>
    </div>
</div>

<footer>ESTUDE COM HONRA &bull; PMMG 2026</footer>

<script>
    const cronograma = [
        { d: "Segunda-feira", id: 1, t: [
            { h: "13:30", m: "Revisão Processo Penal", o: "Revisão 24h" },
            { h: "13:45", m: "Português", o: "Teoria + 10 questões", q: true },
            { h: "14:45", m: "Direito Constitucional", o: "Teoria + 10 questões", q: true },
            { h: "15:45", m: "Pausa", o: "Intervalo", type: "break" },
            { h: "16:00", m: "Direito Penal", o: "Teoria + 5 questões", q: true },
            { h: "17:00", m: "Processo Penal", o: "15 questões", q: true },
            { h: "18:00", m: "Exercício", o: "Prática" }
        ]},
        { d: "Terça-feira", id: 2, t: [
            { h: "13:30", m: "Revisão Penal", o: "Revisão 24h" },
            { h: "13:45", m: "Português", o: "Teoria + 10 questões", q: true },
            { h: "14:45", m: "Direito Constitucional", o: "Lei Seca + 10 questões", q: true },
            { h: "15:45", m: "Pausa", o: "Intervalo", type: "break" },
            { h: "16:00", m: "Direito Administrativo", o: "Teoria + 5 questões", q: true },
            { h: "17:00", m: "Processo Civil", o: "15 questões", q: true },
            { h: "18:00", m: "Direito Civil", o: "Teoria + 10 questões", q: true }
        ]},
        { d: "Quarta-feira", id: 3, t: [
            { h: "13:30", m: "Revisão Administrativo", o: "Revisão 24h" },
            { h: "13:45", m: "Português", o: "Interpretação + 10 questões", q: true },
            { h: "14:45", m: "Direito Constitucional", o: "Controle + 10 questões", q: true },
            { h: "15:45", m: "Pausa", o: "Intervalo", type: "break" },
            { h: "16:00", m: "Direito Penal", o: "Teoria + 5 questões", q: true },
            { h: "17:00", m: "Legislação Extravagante", o: "10 a 15 questões", q: true },
            { h: "18:00", m: "Exercício", o: "Prática" }
        ]},
        { d: "Quinta-feira", id: 4, t: [
            { h: "13:30", m: "Revisão Civil", o: "Revisão 24h" },
            { h: "13:45", m: "Português", o: "Gramática + 10 questões", q: true },
            { h: "14:45", m: "Direito Constitucional", o: "Organização + 10 questões", q: true },
            { h: "15:45", m: "Pausa", o: "Intervalo", type: "break" },
            { h: "16:00", m: "Processo Penal", o: "Teoria + 5 questões", q: true },
            { h: "17:00", m: "Direito Administrativo", o: "15 questões", q: true },
            { h: "18:00", m: "Processo Civil", o: "Teoria + 10 questões", q: true }
        ]},
        { d: "Sexta-feira", id: 5, t: [
            { h: "13:30", m: "Revisão Constitucional", o: "Revisão 24h" },
            { h: "13:45", m: "Português", o: "20 questões", q: true },
            { h: "14:45", m: "Direito Constitucional", o: "20 questões", q: true },
            { h: "15:45", m: "Pausa", o: "Intervalo", type: "break" },
            { h: "16:00", m: "Direito Civil", o: "Teoria + 5 questões", q: true },
            { h: "17:00", m: "Legislação Extravagante", o: "15 questões", q: true },
            { h: "17:40", m: "Revisão Semanal", o: "Geral" },
            { h: "18:00", m: "Exercício", o: "Prática" }
        ]}
    ];

    let currentQ = null;

    function showPage(pageName) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
        
        document.getElementById('page-' + pageName).classList.add('active');
        document.getElementById('nav-' + pageName).classList.add('active');
        
        if(pageName === 'questoes') updateStatsPage();
    }

    function renderCronograma() {
        document.getElementById('cronograma-render').innerHTML = cronograma.map(dia => `
            <div class="day-section">
                <div class="day-title">${dia.d}</div>
                <div class="task-list">
                    ${dia.t.map((t, idx) => {
                        const id = `cfo-${dia.id}-${idx}`;
                        const chk = localStorage.getItem(id) === 'true' ? 'checked' : '';
                        return `
                        <label class="task-item ${t.type || ''}">
                            <input type="checkbox" onchange="handleTask('${id}', ${t.q || false}, this.checked, '${t.m}')" ${chk}>
                            <span class="time-tag">${t.h}</span>
                            <div class="info"><span class="name">${t.m}</span><span class="obs">${t.o}</span></div>
                        </label>`;
                    }).join('')}
                </div>
            </div>
        `).join('');
    }

    function handleTask(id, isQ, checked, name) {
        if (checked && isQ) {
            currentQ = id;
            document.getElementById('modal-materia').innerText = name;
            document.getElementById('modal').style.display = 'block';
        } else {
            localStorage.setItem(id, checked);
            if(!checked) { localStorage.removeItem(id+'-tot'); localStorage.removeItem(id+'-hit'); }
        }
    }

    function fecharModal() { document.getElementById('modal').style.display = 'none'; renderCronograma(); }

    function salvarQuestao() {
        const t = parseInt(document.getElementById('in-tot').value) || 0;
        const h = parseInt(document.getElementById('in-hit').value) || 0;
        localStorage.setItem(currentQ, 'true');
        localStorage.setItem(currentQ + '-tot', t);
        localStorage.setItem(currentQ + '-hit', h);
        document.getElementById('modal').style.display = 'none';
        document.getElementById('in-tot').value = ''; document.getElementById('in-hit').value = '';
        renderCronograma();
    }

    function updateStatsPage() {
        let tt = 0, th = 0;
        for (let i = 0; i < localStorage.length; i++){
            let key = localStorage.key(i);
            if (key.endsWith('-tot')) tt += parseInt(localStorage.getItem(key)) || 0;
            if (key.endsWith('-hit')) th += parseInt(localStorage.getItem(key)) || 0;
        }
        const perc = tt > 0 ? Math.round((th/tt)*100) : 0;
        document.getElementById('resumo-perc').innerText = perc + '%';
        document.getElementById('resumo-total').innerText = tt;
        document.getElementById('resumo-acertos').innerText = th;
        document.getElementById('resumo-erros').innerText = tt - th;
        document.getElementById('resumo-detalhe').innerText = `Você realizou ${tt} questões e acertou ${th}. Mantenha a disciplina!`;
    }

    function clearStats() {
        if(confirm("Deseja zerar todo o seu histórico de questões?")) {
            localStorage.clear();
            location.reload();
        }
    }

    function clock() {
        const n = new Date();
        document.getElementById('clock').innerText = n.toLocaleTimeString('pt-BR');
        document.getElementById('date').innerText = n.toLocaleDateString('pt-BR', {weekday:'long', day:'numeric', month:'long'});
    }

    setInterval(clock, 1000);
    renderCronograma();
    clock();
</script>
</body>
</html>
