<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Aluno - CFO/MG | PMMG</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --pm-gold: #C5A059; /* Dourado Oficial PMMG */
            --pm-navy: #003366; 
            --danger: #ff4d4d;
            --success: #2ecc71;
            --bg: #f0f2f5;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 0;
            color: #333;
        }

        header {
            background: var(--pm-gold); /* Fundo Dourado */
            color: black;
            padding: 40px 20px 80px;
            text-align: center;
            border-bottom: 5px solid var(--pm-navy);
            position: relative;
        }

        .pmmg-text {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--pm-navy);
            letter-spacing: 5px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        header h1 { margin: 5px 0; font-size: 1.8rem; font-weight: 900; }
        header p { margin: 0; color: white; font-weight: 800; letter-spacing: 2px; }

        nav {
            background: var(--pm-navy);
            padding: 10px 0;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: 700;
            margin: 0 15px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .container {
            max-width: 600px;
            margin: -60px auto 50px;
            padding: 0 15px;
        }

        .status-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            margin-bottom: 25px;
            text-align: center;
        }

        #live-clock { font-size: 2.2rem; font-weight: 900; color: var(--pm-navy); margin: 0; }
        #date-display { color: #666; font-weight: bold; text-transform: capitalize; margin-top: 5px; }

        .study-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .study-box {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            border-left: 6px solid var(--pm-navy);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .box-header {
            background: #f8f9fa;
            padding: 15px 20px;
            font-weight: 800;
            color: var(--pm-navy);
            border-bottom: 1px solid #eee;
            text-transform: uppercase;
        }

        .task-list { padding: 5px 20px; }

        .task-item {
            display: flex;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #f1f1f1;
            cursor: pointer;
            position: relative;
        }

        .task-item:last-child { border-bottom: none; }

        input[type="checkbox"] {
            width: 22px;
            height: 22px;
            margin-right: 15px;
            accent-color: var(--pm-navy);
            cursor: pointer;
        }

        .time-tag {
            font-size: 0.8rem;
            font-weight: 800;
            background: var(--pm-navy);
            color: white;
            padding: 3px 7px;
            border-radius: 4px;
            margin-right: 12px;
            color: white;
            min-width: 45px;
            text-align: center;
        }

        .task-label { flex-grow: 1; font-weight: 600; font-size: 0.95rem; }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.4);
        }

        .modal-content {
            background-color: white;
            margin: 15% auto;
            padding: 20px;
            border-radius: 10px;
            width: 80%;
            max-width: 400px;
            text-align: center;
        }

        .modal h2 { color: var(--pm-navy); }
        .modal input { width: 80%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .modal button { background-color: var(--pm-gold); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }

        .stats-box {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            text-align: center;
            margin-bottom: 25px;
        }

        .stats-box h3 { color: var(--pm-navy); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .stat-item { background: #f8f9fa; padding: 15px; border-radius: 10px; }
        .stat-item span { font-size: 1.5rem; font-weight: 900; color: var(--pm-navy); }

        footer { text-align: center; padding: 40px 20px; color: #999; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="pmmg-text">PMMG</div>
    <h1>Área do Aluno - CFO/MG</h1>
    <p>RUMO À GLORIOSA</p>
</header>

<nav>
    <a href="#">Dashboard</a>
    <a href="#">Grade de Estudos</a>
    <a href="#">Questões</a>
</nav>

<div class="container">
    <div class="status-card">
        <p id="live-clock">00:00:00</p>
        <div id="date-display">Carregando dados oficiais...</div>
    </div>

    <div class="study-grid">
        <div class="study-box">
            <div class="box-header">TEORIA</div>
            <div class="task-list" id="theory-content">
                </div>
        </div>
        <div class="study-box">
            <div class="box-header">ATIVIDADE</div>
            <div class="task-list" id="activity-content">
                </div>
        </div>
    </div>

    <div class="stats-box">
        <h3>📊 RESUMO GERAL DE QUESTÕES</h3>
        <div class="stats-grid">
            <div class="stat-item">
                <span id="total-questions">0</span>
                <p>Questões Totais Realizadas</p>
            </div>
            <div class="stat-item">
                <span id="overall-percentage">0%</span>
                <p>Índice Geral de Acerto</p>
            </div>
        </div>
    </div>
</div>

<div id="activity-modal" class="modal">
    <div class="modal-content">
        <h2>Registrar Atividade</h2>
        <input type="number" id="num-activities" placeholder="Quantas atividades fez?">
        <input type="number" id="num-correct" placeholder="Quantas acertou?">
        <button id="save-activity">Confirmar</button>
    </div>
</div>

<footer>ESTUDE COM HONRA | PMMG 2024</footer>

<script>
    // Configuração do Cronograma (Exemplo para Segunda-feira)
    const cronogramaTeoria = [
        { d: "Segunda-feira", tarefas: [
            { h: "13:30", t: "Revisão Processo Penal (Revisão 24h)" },
            { h: "13:45", t: "Língua Portuguesa (Teoria)" }
        ]}
    ];

    const cronogramaAtividade = [
        { d: "Segunda-feira", tarefas: [
            { h: "14:45", t: "Direito Constitucional (10 questões)" },
            { h: "15:45", t: "Pausa (15 min)" }
        ]}
    ];

    let currentDayIndex = 0; // Exemplo fixo para segunda-feira

    function renderizar() {
        // Teoria
        const theoryContainer = document.getElementById('theory-content');
        theoryContainer.innerHTML = cronogramaTeoria[currentDayIndex].tarefas.map(tarefa => {
            const taskId = `theory-${currentDayIndex}-${tarefa.h}`;
            const isChecked = localStorage.getItem(taskId) === 'true' ? 'checked' : '';
            return `
                <label class="task-item">
                    <input type="checkbox" onchange="localStorage.setItem('${taskId}', this.checked)" ${isChecked}>
                    <span class="time-tag">${tarefa.h}</span>
                    <span class="task-label">${tarefa.t}</span>
                </label>
            `;
        }).join('');

        // Atividade
        const activityContainer = document.getElementById('activity-content');
        activityContainer.innerHTML = cronogramaAtividade[currentDayIndex].tarefas.map(tarefa => {
            const taskId = `activity-${currentDayIndex}-${tarefa.h}`;
            const isChecked = localStorage.getItem(taskId) === 'true' ? 'checked' : '';
            return `
                <label class="task-item">
                    <input type="checkbox" class="activity-checkbox" data-task-id="${taskId}" ${isChecked}>
                    <span class="time-tag">${tarefa.h}</span>
                    <span class="task-label">${tarefa.t}</span>
                </label>
            `;
        }).join('');

        configurarCheckboxesAtividade();
    }

    // Modal de Atividades
    const modal = document.getElementById("activity-modal");
    let activeActivityId = null;

    function configurarCheckboxesAtividade() {
        document.querySelectorAll('.activity-checkbox').forEach(checkbox => {
            checkbox.addEventListener('change', function() {
                if (this.checked) {
                    activeActivityId = this.dataset.taskId;
                    modal.style.display = "block";
                }
            });
        });
    }

    document.getElementById("save-activity").onclick = function() {
        const totalNum = document.getElementById("num-activities").value;
        const correctNum = document.getElementById("num-correct").value;

        if (totalNum && correctNum && activeActivityId) {
            localStorage.setItem(`${activeActivityId}-total`, totalNum);
            localStorage.setItem(`${activeActivityId}-correct`, correctNum);
            localStorage.setItem(activeActivityId, 'true'); // Salva o check
            modal.style.display = "none";
            atualizarEstatisticas();
        }
    };

    // Estatísticas
    function atualizarEstatisticas() {
        let totalQuestions = 0;
        let totalCorrect = 0;

        cronogramaAtividade.forEach((dia, dayIdx) => {
            dia.tarefas.forEach(tarefa => {
                const taskId = `activity-${dayIdx}-${tarefa.h}`;
                const totalStored = parseInt(localStorage.getItem(`${taskId}-total`)) || 0;
                const correctStored = parseInt(localStorage.getItem(`${taskId}-correct`)) || 0;
                totalQuestions += totalStored;
                totalCorrect += correctStored;
            });
        });

        const overallPercentage = totalQuestions > 0 ? Math.round((totalCorrect / totalQuestions) * 100) : 0;

        document.getElementById('total-questions').innerText = totalQuestions;
        document.getElementById('overall-percentage').innerText = `${overallPercentage}%`;
    }

    function updateLogic() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('pt-BR');
        
        const options = { weekday: 'long', day: 'numeric', month: 'long' };
        document.getElementById('date-display').innerText = now.toLocaleDateString('pt-BR', options);
    }

    // Iniciar sistema
    renderizar();
    atualizarEstatisticas();
    setInterval(updateLogic, 1000);
    updateLogic();
</script>
</body>
</html>
