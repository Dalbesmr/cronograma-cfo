<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QAP | Cronograma CFO PMMG</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --pm-navy: #002d5b; 
            --pm-gold: #c5a059; 
            --danger: #ff4d4d;
            --success: #2ecc71;
            --bg: #f0f2f5;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 0;
            color: #333;
        }

        header {
            background: linear-gradient(135deg, var(--pm-navy) 0%, #001a35 100%);
            color: white;
            padding: 40px 20px 80px;
            text-align: center;
            border-bottom: 5px solid var(--pm-gold);
        }

        .container {
            max-width: 600px;
            margin: -60px auto 50px;
            padding: 0 15px;
        }

        .status-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            margin-bottom: 25px;
            text-align: center;
        }

        #live-clock { font-size: 2.2rem; font-weight: 900; color: var(--pm-navy); margin: 0; }
        #date-display { color: var(--pm-gold); font-weight: bold; text-transform: capitalize; margin-top: 5px; }

        .day-block {
            background: white;
            border-radius: 12px;
            margin-bottom: 25px;
            overflow: hidden;
            border-left: 6px solid var(--pm-navy);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .day-header {
            background: #f8f9fa;
            padding: 15px 20px;
            font-weight: 800;
            color: var(--pm-navy);
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-list { padding: 5px 20px; }

        .task-item {
            display: flex;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #f1f1f1;
            cursor: pointer;
            position: relative;
        }

        .task-item:last-child { border-bottom: none; }

        input[type="checkbox"] {
            width: 22px;
            height: 22px;
            margin-right: 15px;
            accent-color: var(--pm-navy);
            cursor: pointer;
        }

        .time-tag {
            font-size: 0.8rem;
            font-weight: 800;
            background: #eee;
            padding: 3px 7px;
            border-radius: 4px;
            margin-right: 12px;
            color: #555;
            min-width: 45px;
            text-align: center;
        }

        .task-label { flex-grow: 1; font-weight: 600; font-size: 0.95rem; }

        .overdue-badge {
            background: var(--danger);
            color: white;
            font-size: 0.65rem;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 900;
            display: none;
            animation: pulse 1.5s infinite;
            margin-left: 10px;
        }

        @keyframes pulse {
            0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; }
        }

        input:checked ~ .task-label { text-decoration: line-through; color: #bbb; }
        input:checked ~ .overdue-badge { display: none !important; }

        footer { text-align: center; padding: 40px 20px; color: #999; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <i class="fas fa-shield-halved" style="color: var(--pm-gold); font-size: 2.5rem; margin-bottom: 10px;"></i>
    <h1 style="margin: 0 0 5px;">ESTUDOS CFO PMMG</h1>
    <p style="opacity: 0.9; font-weight: bold; letter-spacing: 1px;">RUMO À ACADEMIA (APM)</p>
</header>

<div class="container">
    <div class="status-card">
        <p id="live-clock">00:00:00</p>
        <div id="date-display">Carregando dados oficiais...</div>
    </div>

    <div id="schedule-content">
        </div>
</div>

<footer>ESTUDE COM ESTRATÉGIA | FORÇA E HONRA</footer>

    function renderizar() {
        const container = document.getElementById('schedule-content');
        container.innerHTML = cronograma.map(dia => `
            <div class="day-block">
                <div class="day-header">${dia.dia} <i class="fas fa-calendar-check" style="opacity:0.3"></i></div>
                <div class="task-list" data-weekday="${dia.id}">
                    ${dia.tarefas.map(tarefa => {
                        const taskId = `task-${dia.id}-${tarefa.h}`;
                        const isChecked = localStorage.getItem(taskId) === 'true' ? 'checked' : '';
                        return `
                        <label class="task-item">
                            <input type="checkbox" onchange="save('${taskId}', this.checked)" ${isChecked}>
                            <span class="time-tag" data-time="${tarefa.h}">${tarefa.h}</span>
                            <span class="task-label">${tarefa.t}</span>
                            <span class="overdue-badge">EM ATRASO</span>
                        </label>
                    `}).join('')}
                </div>
            </div>
        `).join('');
    }

        localStorage.setItem(id, value); 
        updateLogic(); 
    }
